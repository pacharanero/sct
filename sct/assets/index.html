<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sct — SNOMED CT Explorer</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0d1117;
  --bg2:       #161b22;
  --bg3:       #1c2128;
  --border:    #30363d;
  --text:      #c9d1d9;
  --text-dim:  #6e7681;
  --blue:      #003087;
  --blue-hl:   #1f6feb;
  --cyan:      #39c5cf;
  --yellow:    #e3b341;
  --green:     #3fb950;
  --radius:    6px;
}

html, body { height: 100%; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
  font-size: 14px;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

header {
  background: var(--blue);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
}
header h1 { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: .5px; }
header .badge {
  font-size: 11px;
  color: rgba(255,255,255,.6);
  padding: 2px 6px;
  border: 1px solid rgba(255,255,255,.25);
  border-radius: 20px;
}

#search-bar {
  padding: 10px 16px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#search-input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 15px;
  padding: 8px 12px;
  outline: none;
  transition: border-color .15s;
}
#search-input:focus { border-color: var(--blue-hl); }
#search-input::placeholder { color: var(--text-dim); }

#main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

#left-panel {
  width: 340px;
  min-width: 240px;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}

#right-panel {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
}

.panel-section {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.panel-section.results-section { flex: 1; min-height: 0; }
.panel-section.hierarchy-section { border-bottom: 1px solid var(--border); flex-shrink: 0; max-height: 240px; }

.section-title {
  padding: 8px 12px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .8px;
  color: var(--text-dim);
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  flex-shrink: 0;
}

.list-scroll { overflow-y: auto; flex: 1; }

.list-item {
  padding: 7px 14px;
  cursor: pointer;
  border-bottom: 1px solid transparent;
  transition: background .1s;
  display: flex;
  align-items: baseline;
  gap: 8px;
}
.list-item:hover { background: var(--bg3); }
.list-item.active { background: var(--blue); }
.list-item .item-label { color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.list-item .item-id { color: var(--cyan); font-family: monospace; font-size: 11px; flex-shrink: 0; }
.list-item .hier-arrow { color: var(--text-dim); font-size: 12px; }

.empty-state {
  padding: 20px 14px;
  color: var(--text-dim);
  font-size: 13px;
  text-align: center;
}

/* Detail panel */
#concept-detail { max-width: 820px; }
#concept-detail.empty {
  color: var(--text-dim);
  padding-top: 60px;
  text-align: center;
  font-size: 15px;
}
#concept-detail.empty p { margin-top: 8px; font-size: 13px; }

.concept-title {
  font-size: 22px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 4px;
}
.concept-fsn {
  color: var(--text-dim);
  font-size: 13px;
  margin-bottom: 20px;
}

.detail-grid {
  display: grid;
  grid-template-columns: 120px 1fr;
  gap: 6px 12px;
  margin-bottom: 24px;
}
.detail-label { color: var(--text-dim); font-size: 12px; padding-top: 2px; }
.detail-value { color: var(--text); }
.detail-value.sctid { color: var(--cyan); font-family: monospace; font-weight: 700; font-size: 15px; }
.detail-value.hierarchy { color: var(--yellow); }

.section-heading {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .8px;
  color: var(--text-dim);
  margin: 20px 0 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

.synonyms-list { display: flex; flex-wrap: wrap; gap: 6px; }
.synonym-pill {
  background: rgba(227, 179, 65, .12);
  border: 1px solid rgba(227, 179, 65, .3);
  color: var(--yellow);
  border-radius: 20px;
  padding: 2px 10px;
  font-size: 12px;
}

.path-list { display: flex; align-items: center; flex-wrap: wrap; gap: 4px; font-size: 13px; }
.path-item { color: var(--text-dim); }
.path-arrow { color: var(--border); }
.path-item.current { color: var(--text); font-weight: 600; }

.attr-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.attr-table td { padding: 5px 8px; border-bottom: 1px solid var(--border); }
.attr-table td:first-child { color: var(--text-dim); width: 160px; white-space: nowrap; }
.attr-table .attr-id { color: var(--cyan); font-family: monospace; font-size: 11px; }

.concept-link {
  color: var(--blue-hl);
  cursor: pointer;
  text-decoration: none;
}
.concept-link:hover { text-decoration: underline; }

.children-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 6px;
  margin-top: 8px;
}
.child-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 12px;
  cursor: pointer;
  transition: border-color .15s;
}
.child-card:hover { border-color: var(--blue-hl); }
.child-card .child-term { font-size: 13px; color: var(--text); }
.child-card .child-id { font-size: 11px; color: var(--cyan); font-family: monospace; }

.tabs { display: flex; gap: 0; margin-bottom: 8px; }
.tab {
  padding: 5px 14px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-dim);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color .15s, border-color .15s;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--blue-hl); border-color: var(--blue-hl); }

.spinner {
  display: inline-block;
  width: 14px; height: 14px;
  border: 2px solid var(--border);
  border-top-color: var(--blue-hl);
  border-radius: 50%;
  animation: spin .6s linear infinite;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>sct</h1>
  <span class="badge">SNOMED CT Explorer</span>
</header>

<div id="search-bar">
  <input id="search-input" type="text" placeholder="Search concepts by name, synonym, or SCTID…" autocomplete="off" spellcheck="false">
</div>

<div id="main">
  <div id="left-panel">

    <div class="panel-section hierarchy-section">
      <div class="section-title">Hierarchies</div>
      <div class="list-scroll" id="hierarchy-list">
        <div class="empty-state"><span class="spinner"></span></div>
      </div>
    </div>

    <div class="panel-section results-section">
      <div class="section-title" id="results-title">Results</div>
      <div class="list-scroll" id="results-list">
        <div class="empty-state">Search above or select a hierarchy</div>
      </div>
    </div>

  </div>

  <div id="right-panel">
    <div id="concept-detail" class="empty">
      <div>Select a concept to view details</div>
      <p>Search by name or browse a hierarchy on the left.</p>
    </div>
  </div>
</div>

<script>
"use strict";

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let activeConceptId = null;
let activeResultEl = null;
let activeHierarchyEl = null;
let searchTimer = null;
let history = [];

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------
document.addEventListener("DOMContentLoaded", () => {
  loadHierarchies();
  document.getElementById("search-input").addEventListener("input", onSearchInput);
  document.getElementById("search-input").addEventListener("keydown", (e) => {
    if (e.key === "Escape") { e.target.value = ""; clearResults(); }
  });
});

// ---------------------------------------------------------------------------
// Hierarchy
// ---------------------------------------------------------------------------
async function loadHierarchies() {
  const el = document.getElementById("hierarchy-list");
  try {
    const data = await apiFetch("/api/hierarchy");
    if (!data.hierarchies || data.hierarchies.length === 0) {
      el.innerHTML = '<div class="empty-state">No hierarchies found</div>';
      return;
    }
    el.innerHTML = "";
    data.hierarchies.forEach(h => {
      const item = makeEl("div", "list-item");
      item.innerHTML = `<span class="item-label">${esc(h)}</span><span class="hier-arrow">›</span>`;
      item.addEventListener("click", () => {
        setActiveHierarchy(item);
        loadHierarchyConcepts(h);
        document.getElementById("search-input").value = "";
      });
      el.appendChild(item);
    });
  } catch(e) {
    el.innerHTML = `<div class="empty-state">Error: ${esc(e.message)}</div>`;
  }
}

function setActiveHierarchy(el) {
  if (activeHierarchyEl) activeHierarchyEl.classList.remove("active");
  activeHierarchyEl = el;
  el.classList.add("active");
}

async function loadHierarchyConcepts(hierarchy) {
  const title = document.getElementById("results-title");
  const list = document.getElementById("results-list");
  title.textContent = `Results — ${hierarchy}`;
  list.innerHTML = '<div class="empty-state"><span class="spinner"></span></div>';
  try {
    const data = await apiFetch(`/api/search?q=${encodeURIComponent(hierarchy)}&limit=100`);
    // Filter to this hierarchy exactly via a hierarchy-specific search
    // Fall back to a hierarchy endpoint-style query using the hierarchy param
    const results = (data.results || []).filter(r => r.hierarchy === hierarchy);
    renderResults(results, hierarchy);
  } catch(e) {
    list.innerHTML = `<div class="empty-state">Error: ${esc(e.message)}</div>`;
  }
}

// ---------------------------------------------------------------------------
// Search
// ---------------------------------------------------------------------------
function onSearchInput(e) {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  if (!q) { clearResults(); return; }
  searchTimer = setTimeout(() => runSearch(q), 200);
}

async function runSearch(q) {
  const title = document.getElementById("results-title");
  const list = document.getElementById("results-list");
  title.textContent = "Results";
  list.innerHTML = '<div class="empty-state"><span class="spinner"></span></div>';
  if (activeHierarchyEl) { activeHierarchyEl.classList.remove("active"); activeHierarchyEl = null; }
  try {
    const data = await apiFetch(`/api/search?q=${encodeURIComponent(q)}&limit=50`);
    renderResults(data.results || [], null, data.total);
  } catch(e) {
    list.innerHTML = `<div class="empty-state">Error: ${esc(e.message)}</div>`;
  }
}

function clearResults() {
  document.getElementById("results-title").textContent = "Results";
  document.getElementById("results-list").innerHTML =
    '<div class="empty-state">Search above or select a hierarchy</div>';
  activeResultEl = null;
}

function renderResults(results, _hierarchyFilter, total) {
  const title = document.getElementById("results-title");
  const list = document.getElementById("results-list");
  if (!results.length) {
    title.textContent = "Results (0)";
    list.innerHTML = '<div class="empty-state">No results found</div>';
    return;
  }
  title.textContent = `Results (${total !== undefined ? total : results.length})`;
  list.innerHTML = "";
  results.forEach(r => {
    const item = makeEl("div", "list-item");
    if (r.id === activeConceptId) { item.classList.add("active"); activeResultEl = item; }
    item.innerHTML = `
      <span class="item-label">${esc(r.preferred_term)}</span>
      <span class="item-id">${esc(r.id)}</span>`;
    item.addEventListener("click", () => {
      setActiveResult(item);
      loadConcept(r.id);
    });
    list.appendChild(item);
  });
}

function setActiveResult(el) {
  if (activeResultEl) activeResultEl.classList.remove("active");
  activeResultEl = el;
  el.classList.add("active");
}

// ---------------------------------------------------------------------------
// Concept detail
// ---------------------------------------------------------------------------
async function loadConcept(id, pushHistory) {
  if (pushHistory !== false && activeConceptId && activeConceptId !== id) {
    history.push(activeConceptId);
    if (history.length > 20) history.shift();
  }
  activeConceptId = id;
  const panel = document.getElementById("concept-detail");
  panel.className = "";
  panel.innerHTML = '<div style="padding:40px;text-align:center"><span class="spinner"></span></div>';
  try {
    const c = await apiFetch(`/api/concept/${encodeURIComponent(id)}`);
    if (c.error) { panel.innerHTML = `<div class="empty-state">${esc(c.error)}</div>`; return; }
    renderConcept(c, panel);
  } catch(e) {
    panel.innerHTML = `<div class="empty-state">Error: ${esc(e.message)}</div>`;
  }
}

function renderConcept(c, panel) {
  const synonyms = Array.isArray(c.synonyms) ? c.synonyms : [];
  const path     = Array.isArray(c.hierarchy_path) ? c.hierarchy_path : [];
  const parents  = Array.isArray(c.parents) ? c.parents : [];
  const attrs    = c.attributes && typeof c.attributes === "object" ? c.attributes : {};

  let html = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
      <div class="concept-title">${esc(c.preferred_term)}</div>
      ${history.length ? `<button onclick="goBack()" style="background:none;border:1px solid var(--border);color:var(--text-dim);padding:3px 10px;border-radius:4px;cursor:pointer;font-size:12px">← back</button>` : ""}
    </div>
    <div class="concept-fsn">${esc(c.fsn)}</div>
    <div class="detail-grid">
      <span class="detail-label">SCTID</span>
      <span class="detail-value sctid">${esc(c.id)}</span>
      <span class="detail-label">Hierarchy</span>
      <span class="detail-value hierarchy">${esc(c.hierarchy || "—")}</span>
      <span class="detail-label">Children</span>
      <span class="detail-value">${c.children_count || 0}</span>
    </div>`;

  if (synonyms.length) {
    html += `<div class="section-heading">Synonyms</div>
      <div class="synonyms-list">
        ${synonyms.map(s => `<span class="synonym-pill">${esc(s)}</span>`).join("")}
      </div>`;
  }

  if (path.length) {
    html += `<div class="section-heading">Hierarchy path</div>
      <div class="path-list">
        ${path.map((item, i) => {
          const isCurrent = i === path.length - 1;
          return `<span class="path-item${isCurrent ? " current" : ""}">${esc(item)}</span>
            ${isCurrent ? "" : '<span class="path-arrow">›</span>'}`;
        }).join("")}
      </div>`;
  }

  if (parents.length) {
    html += `<div class="section-heading">Parents</div>
      <div>
        ${parents.map(p => `
          <div style="margin-bottom:4px">
            <span class="concept-link" onclick="loadConcept('${esc(p.id)}')">${esc(p.fsn || p.id)}</span>
            <span style="color:var(--cyan);font-family:monospace;font-size:11px;margin-left:8px">${esc(p.id)}</span>
          </div>`).join("")}
      </div>`;
  }

  const attrEntries = Object.entries(attrs);
  if (attrEntries.length) {
    html += `<div class="section-heading">Attributes</div>
      <table class="attr-table">
        ${attrEntries.flatMap(([key, vals]) =>
          (Array.isArray(vals) ? vals : []).map(v => `
            <tr>
              <td>${esc(key.replace(/_/g, " "))}</td>
              <td>
                <span class="concept-link" onclick="loadConcept('${esc(v.id)}')">${esc(v.fsn || v.id)}</span>
                <span class="attr-id"> [${esc(v.id)}]</span>
              </td>
            </tr>`)
        ).join("")}
      </table>`;
  }

  if (c.children_count > 0) {
    html += `<div class="section-heading">Children (${c.children_count})</div>
      <div id="children-container">
        <button onclick="loadChildren('${esc(c.id)}')"
          style="background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:4px;cursor:pointer;font-size:13px">
          Show children
        </button>
      </div>`;
  }

  panel.innerHTML = html;
}

async function loadChildren(id) {
  const container = document.getElementById("children-container");
  container.innerHTML = '<span class="spinner"></span>';
  try {
    const data = await apiFetch(`/api/children/${encodeURIComponent(id)}`);
    const children = data.children || [];
    if (!children.length) { container.textContent = "No children found."; return; }
    container.innerHTML = `<div class="children-grid">
      ${children.map(ch => `
        <div class="child-card" onclick="loadConcept('${esc(ch.id)}')">
          <div class="child-term">${esc(ch.preferred_term)}</div>
          <div class="child-id">${esc(ch.id)}</div>
        </div>`).join("")}
    </div>`;
  } catch(e) {
    container.textContent = `Error: ${e.message}`;
  }
}

function goBack() {
  const id = history.pop();
  if (id) loadConcept(id, false);
}

// ---------------------------------------------------------------------------
// Utilities
// ---------------------------------------------------------------------------
async function apiFetch(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

function makeEl(tag, className) {
  const el = document.createElement(tag);
  if (className) el.className = className;
  return el;
}

function esc(s) {
  if (s == null) return "";
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}
</script>
</body>
</html>
